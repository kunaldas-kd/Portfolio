<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axiom — {PAGE_TITLE}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <!-- PAGE-SPECIFIC CSS -->
  <link rel="stylesheet" href="{PAGE_CSS}" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="nav">
    <a href="home.html" class="nav__logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
        <polygon points="14,2 26,22 2,22" stroke="currentColor" stroke-width="2" fill="none"/>
        <circle cx="14" cy="14" r="3" fill="currentColor"/>
      </svg>
      <span>Axiom</span>
    </a>

    <ul class="nav__links" role="list">
      <li><a href="home.html" class="nav__link" data-page="home">Home</a></li>
      <li><a href="about.html" class="nav__link" data-page="about">About</a></li>
      <li><a href="contact.html" class="nav__link" data-page="contact">Contact</a></li>
    </ul>

    <div class="nav__right">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">
        <span class="theme-toggle__icon theme-toggle__icon--light">☀</span>
        <span class="theme-toggle__icon theme-toggle__icon--dark">☽</span>
        <span class="theme-toggle__icon theme-toggle__icon--auto">⬡</span>
      </button>
      <button class="nav__burger" id="navBurger" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <ul role="list">
      <li><a href="home.html" data-page="home">Home</a></li>
      <li><a href="about.html" data-page="about">About</a></li>
      <li><a href="contact.html" data-page="contact">Contact</a></li>
    </ul>
  </div>

  <!-- PAGE CONTENT INJECTED HERE -->
  <main id="main-content">
    {PAGE_CONTENT}
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__brand">Axiom</span>
      <span class="footer__copy">&copy; 2026 — All rights reserved</span>
      <div class="footer__links">
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </footer>

  <script src="shared.js"></script>
  <!-- PAGE-SPECIFIC JS -->
  <script src="{PAGE_JS}"></script>
</body>
</html>
